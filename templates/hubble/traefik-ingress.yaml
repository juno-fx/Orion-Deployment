{{ if eq .Values.ingressController "traefik" }}
{{- if .Values.active}}
---
# ForwardAuth middleware that passes ALL NextAuth headers like NGINX does
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hubble-auth-middleware
  namespace: {{ .Release.Namespace }}
spec:
  forwardAuth:
    address: "http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/socket-auth/"
    # CRITICAL: Pass ALL original headers (including NextAuth cookies) to auth service
    trustForwardHeader: true
    authResponseHeaders:
      - "X-Forwarded-For"
      - "X-Forwarded-Proto" 
      - "X-Forwarded-Host"
      - "X-Forwarded-Uri"
      - "X-Forwarded-Method"
      - "Cookie"
      - "X-Real-IP"
      - "User-Agent"
      - "Accept"
      - "Accept-Language"
      - "Accept-Encoding"
      - "Cache-Control"
      - "Pragma"
      - "Sec-WebSocket-Key"
      - "Sec-WebSocket-Version"
      - "Sec-WebSocket-Extensions"
      - "Origin"
      - "Upgrade"
      - "Connection"
---
# Buffering middleware for body size management (1GB limit)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hubble-buffering
  namespace: {{ .Release.Namespace }}
spec:
  buffering:
    maxRequestBodyBytes: 1073741824  # 1GB limit
    memRequestBodyBytes: 104857600   # 100MB memory threshold
---
# ServersTransport for timeout configurations equivalent to nginx settings
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: hubble-timeouts-transport
  namespace: {{ .Release.Namespace }}
spec:
  forwardingTimeouts:
    dialTimeout: "30s"           # nginx proxy-connect-timeout equivalent
    responseHeaderTimeout: "30s" # nginx proxy-send-timeout equivalent
    idleConnTimeout: "30s"       # nginx proxy-read-timeout equivalent
---
# Middleware chain with auth BEFORE buffering (critical for WebSockets)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hubble-chain
  namespace: {{ .Release.Namespace }}
spec:
  chain:
    middlewares:
      - name: hubble-auth-middleware
      - name: hubble-buffering
---
# Single Traefik ingress with all middlewares (like your NGINX setup)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hubble-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/issuer: "{{ .Values.cert_manager_issuer }}"
    # Apply middleware chain that includes auth + buffering + timeouts
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-hubble-chain@kubernetescrd"
spec:
  ingressClassName: "{{ .Values.ingressController }}"
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: hubble
                port:
                  number: 3000
          - path: "/socket.io"
            pathType: ImplementationSpecific
            backend:
              service:
                name: hubble
                port:
                  number: 8000
{{ end }}
{{ end }}