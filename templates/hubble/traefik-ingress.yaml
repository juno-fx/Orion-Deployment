{{ if eq .Values.ingressController "traefik" }}
{{- if .Values.active}}
---
# HTTP routes Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Values.namespace }}
  name: hubble-ingress
  annotations:
    cert-manager.io/issuer: "{{ .Values.cert_manager_issuer }}"
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.namespace }}-hubble-auth-middleware@kubernetescrd"
    # Enhanced Session Affinity for Socket.IO
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "juno-hubble-session"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.maxage: "172800"
    traefik.ingress.kubernetes.io/service.sticky.cookie.samesite: "none"
    traefik.ingress.kubernetes.io/service.sticky.cookie.path: "/"
spec:
  ingressClassName: "{{ .Values.ingressController }}"
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: hubble
                port:
                  number: 3000
          - path: "/socket.io"
            pathType: ImplementationSpecific
            backend:
              service:
                name: hubble
                port:
                  number: 8000

---
# Separate WebSocket ingress with authentication middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Values.namespace }}
  name: hubble-websocket-ingress
  annotations:
    cert-manager.io/issuer: "{{ .Values.cert_manager_issuer }}"
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.namespace }}-hubble-websocket-auth-middleware@kubernetescrd"
    # Enhanced Session Affinity for Socket.IO WebSocket connections
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "juno-hubble-session"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.maxage: "172800"
    traefik.ingress.kubernetes.io/service.sticky.cookie.samesite: "none"
    traefik.ingress.kubernetes.io/service.sticky.cookie.path: "/socket.io"
spec:
  ingressClassName: "{{ .Values.ingressController }}"
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/socket.io"
            pathType: ImplementationSpecific
            backend:
              service:
                name: hubble
                port:
                  number: 8000
{{- end}}
{{ end }}