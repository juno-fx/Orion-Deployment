{{- if eq .Values.ingressController "traefik" }}
{{- if .Values.active}}
---
# ForwardAuth middleware for HTTP routes only
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hubble-auth-middleware
  namespace: {{ .Values.namespace }}
spec:
{{/*  forwardingTimeouts:*/}}
{{/*    dialTimeout: "30s"           # nginx proxy-connect-timeout equivalent*/}}
{{/*    responseHeaderTimeout: "30s" # nginx proxy-send-timeout equivalent*/}}
{{/*    idleConnTimeout: "30s"       # nginx proxy-read-timeout equivalent*/}}
{{/*  buffering:*/}}
{{/*    maxRequestBodyBytes: 1073741824  # 1GB limit*/}}
{{/*    memRequestBodyBytes: 104857600   # 100MB memory threshold*/}}
  headers:
    customRequestHeaders:
      Connection: keep-alive, Upgrade
      Upgrade: WebSocket
{{/*  forwardAuth:*/}}
{{/*    address: "http://hubble.{{ .Values.namespace }}.svc.cluster.local:3000/api/socket-auth/"*/}}
{{/*    trustForwardHeader: true*/}}
{{/*    authResponseHeaders:*/}}
{{/*      - "X-Forwarded-For"*/}}
{{/*      - "X-Forwarded-Proto" */}}
{{/*      - "X-Forwarded-Host"*/}}
{{/*      - "X-Forwarded-Uri"*/}}
{{/*      - "X-Forwarded-Method"*/}}
{{/*      - "Cookie"*/}}
{{/*      - "Set-Cookie"*/}}
{{/*      - "Authorization"*/}}
{{/*      - "Sec-WebSocket-Key"*/}}
{{/*      - "Sec-WebSocket-Version"*/}}
{{/*      - "Sec-WebSocket-Extensions"*/}}
{{/*      - "Origin"*/}}
{{/*      - "Upgrade"*/}}
{{/*      - "Connection"*/}}
---
# HTTP routes Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hubble-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/issuer: "{{ .Values.cert_manager_issuer }}"
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.namespace }}-hubble-auth-middleware@kubernetescrd"
spec:
  ingressClassName: "{{ .Values.ingressController }}"
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: hubble
                port:
                  number: 3000
          - path: "/socket.io"
            pathType: ImplementationSpecific
            backend:
              service:
                name: hubble
                port:
                  number: 8000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: websocket-headers
  namespace: {{ .Values.namespace }}
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: https
    customResponseHeaders:
      X-Frame-Options: SAMEORIGIN
      X-Content-Type-Options: nosniff
    sslRedirect: true
    sslForceHost: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: websocket-ratelimit
  namespace: {{ .Values.namespace }}
spec:
  rateLimit:
    average: 100
    period: 1m
    burst: 50
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: websocket-circuit-breaker
  namespace: {{ .Values.namespace }}
spec:
  circuitBreaker:
    expression: ResponseCodeRatio(500, 600, 0, 600) > 0.30
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: websocket-transport
  namespace: {{ .Values.namespace }}
spec:
  serverName: websocket-backend
  insecureSkipVerify: true
  maxIdleConnsPerHost: 100
  forwardingTimeouts:
    dialTimeout: 30s
    responseHeaderTimeout: 3600s
    idleConnTimeout: 3600s
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: websocket-sticky
  namespace: {{ .Values.namespace }}
spec:
  weighted:
    sticky:
      cookie:
        name: websocket_server
        secure: true
        httpOnly: true
        sameSite: strict
    services:
      - name: hubble
        port: 8000
        weight: 1
{{ end }}
{{ end }}