apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orion-hubble-{{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orion-hubble-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: orion-hubble
    namespace: {{ .Release.Namespace }}
