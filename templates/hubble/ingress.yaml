{{- if and .Values.ingress.enabled .Values.active }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Release.Namespace }}
  name: hubble-ingress
  annotations:
{{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: "{{ $value }}"
{{- end }}
spec:
  {{- $className := .Values.ingress.className | default .Values.ingressClassName }}
  {{- if $className }}
  ingressClassName: "{{ $className }}"
  {{- end }}
  rules:
    - http:
        paths:
          - path: "/{{ .Release.Namespace }}"
            pathType: Prefix
            backend:
              service:
                name: hubble
                port:
                  number: 3000
      {{- if .Values.host }}
      host: {{ .Values.host }}
      {{- end }}
{{- end }}
