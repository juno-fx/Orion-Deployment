---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: argocd
  name: orion-hubble-{{ .Values.show }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    resourceNames: ["juno-auth-secret"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
