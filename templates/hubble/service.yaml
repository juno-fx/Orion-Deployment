{{- if .Values.active }}
apiVersion: v1
kind: Service
metadata:
  name: hubble
  namespace: {{ .Release.Namespace }}
  annotations:
{{- range $key, $value := .Values.service.annotations }}
    {{ $key }}: "{{ $value }}"
{{- end }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: ClientIP
  selector:
    app: hubble
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: endpoint
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: socket
{{- end }}
