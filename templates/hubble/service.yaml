{{- if .Values.active }}
apiVersion: v1
kind: Service
metadata:
  name: hubble
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
  selector:
    app: hubble
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: endpoint
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: socket
{{- end }}