{{- if .Values.active }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kuiper
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kuiper
  minReplicas: {{ .Values.kuiper.autoscaling.min_replicas }}
  maxReplicas: {{ .Values.kuiper.autoscaling.max_replicas }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
{{- end }}
